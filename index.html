<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="bingbot" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <title>YouTube → Portrait</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <main class="card">
    <h1>YouTube → Portrait</h1>
    <p class="sub">Incolla un link, scarica il video ritagliato in 9:16</p>

    <section class="card-section" aria-label="Scarica">
      <label for="url">Link YouTube (video o Shorts)</label>
      <input
        type="url"
        id="url"
        placeholder="https://youtube.com/watch?v=... o youtu.be/..."
        autocomplete="off"
        inputmode="url"
      />
      <button type="button" id="btnDownload" class="primary">Scarica</button>
      <div class="progress-wrap" id="progressWrap" aria-hidden="true">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="status" id="status" aria-live="polite"></div>
    </section>

    <hr class="card-separator" aria-hidden="true" />

    <section class="card-section" aria-label="Anteprima">
      <div class="zoom-group">
        <label for="zoom">Zoom</label>
        <div class="zoom-row">
          <input type="number" id="zoom" min="0" max="30" value="7" step="1" aria-label="Zoom percentuale (0-30)" />
          <span class="zoom-hint">% (0–30)</span>
        </div>
      </div>
      <button type="button" id="btnPreview" class="secondary">Genera anteprima</button>
    </section>
  </main>

  <aside class="preview-box" aria-label="Anteprima">
    <div class="preview-wrap" id="previewWrap">
      <span class="preview-placeholder" id="previewPlaceholder">Anteprima</span>
      <img id="previewImg" alt="Anteprima frame" style="display: none" />
    </div>
  </aside>

  <script src="/js/app.js" defer></script>
</body>
</html>
